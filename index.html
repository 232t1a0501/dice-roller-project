<!DOCTYPE html>
<html>
<head>
<title>Dice Roller</title>
<link rel="stylesheet"href="style.css">
</head>

<body>

<h1>Dice Roller</h1>

<button onclick="rollDice()">Roll Dice</button>

<p id="result"></p>

<script>
function rollDice(){
let number = Math.floor(Math.random()*6)+1;
document.getElementById("result").innerText = number;
}
</script>

</body>
</html>
